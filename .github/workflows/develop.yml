name: develop-bake
on:
  push:
    branches:
      - main
    paths:
      - 'dockerfile/**'
      - 'docker-bake.hcl'
      - 'stash/**'
      - 'VERSION'
  workflow_dispatch:
  repository_dispatch:
    types: [upstream_update]
  schedule:
    - cron: '0 0 */7 * *'

permissions:
  contents: read
  packages: write

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      # checkout for timestamp
      - uses: actions/checkout@v5
      - id: meta
        name: set meta environment variables
        run: |
          echo "EPOCH=$(git log -1 --pretty=%ct)" >> $GITHUB_ENV
          echo "TIMESTAMP=$(git log -1 --pretty=%cI)" >> $GITHUB_OUTPUT
          echo "GITHASH=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT
      # set up buildx
      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]
      # login
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # bake
      - uses: docker/bake-action@v6
        with:
          push: true
          targets: |
            develop_ci_alpine
            develop_ci_debian
        env:
          GITHASH: ${{ steps.meta.outputs.GITHASH }}
          BUILD_DATE: ${{ steps.meta.outputs.TIMESTAMP }}
          SOURCE_DATE_EPOCH: ${{ env.EPOCH }}